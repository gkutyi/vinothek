<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Weinverwaltung</title>
<style>
#previewFront,#previewBack{width:120px;height:auto;margin:5px;}
</style>
</head>
<body>
<h2>Wein hinzufügen / bearbeiten</h2>

<label>Vorderetikett: <input type="file" accept="image/*" onchange="handleLabelUpload(this,'front')"></label>
<img id="previewFront">
<br>
<label>Rücketikett: <input type="file" accept="image/*" onchange="handleLabelUpload(this,'back')"></label>
<img id="previewBack">
<br>
<button onclick="analyzeWineWithAI()">KI Analyse</button>
<p id="scanStatus"></p>

<label>Name: <input id="name"></label><br>
<label>Jahrgang: <input id="jahrgang"></label><br>
<label>Winzer: <input id="winzer"></label><br>
<label>Region: <input id="region"></label><br>
<label>Alkohol %: <input id="alkohol"></label><br>
<label>Anzahl: <input id="anzahl" value="1"></label><br>
<label>Notizen: <textarea id="notizen"></textarea></label><br>
<label>Rating: <input id="rating"></label><br>
<label>Preis: <input id="preis"></label><br>
<label>Trinkfenster Von: <input id="trinkVon"></label>
<label>Bis: <input id="trinkBis"></label><br>
<label>Quelle: <input id="quelle"></label><br>

<label>Lagerort:
<select id="global_lagerort" onchange="setStorageLocation()">
<option value="">-- wählen --</option>
<option value="Weinkeller">Weinkeller</option>
<option value="Hauskeller">Hauskeller</option>
</select>
</label>
<label>Platz: <input id="global_platz" onchange="setStorageLocation()"></label>
<p id="currentLocation"></p>

<button onclick="saveWine()">Speichern</button>
<button onclick="exportBackup()">Backup Export</button>
<input type="file" id="importFile">
<button onclick="importBackup()">Backup Import</button>

<h2>Weinliste</h2>
<table id="weinTable" border="1">
<thead>
<tr>
<th onclick="sortTable('name')">Name</th>
<th onclick="sortTable('jahrgang')">Jahrgang</th>
<th onclick="sortTable('winzer')">Winzer</th>
<th onclick="sortTable('region')">Region</th>
<th onclick="sortTable('alkohol')">Alkohol</th>
<th>Lager / Platz</th>
<th>Anzahl</th>
<th>Notizen</th>
<th>Bilder</th>
<th>Quelle</th>
<th>Rating</th>
<th>Preis</th>
<th>Trinkfenster</th>
<th>Aktionen</th>
</tr>
</thead>
<tbody></tbody>
</table>
<script src="app.js"></script>
</body>
</html>
