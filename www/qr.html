<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Lagerplätze</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script defer src="qr.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .lager-block {
            margin-bottom: 40px;
        }

        .lager-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .platz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .platz-card {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        .platz-name {
            margin-top: 10px;
            font-weight: bold;
        }

        .wein-count {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div style="margin-bottom:20px;">
        <button onclick="goBack()">⬅ Zurück</button>
        <button onclick="printQR()">� Print</button>
    </div>

    <h1>� QR Lagerplätze</h1>

    <div id="qrContainer"></div>

</body>
</html>
